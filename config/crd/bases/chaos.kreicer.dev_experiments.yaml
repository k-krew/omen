---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: experiments.chaos.kreicer.dev
spec:
  group: chaos.kreicer.dev
  names:
    kind: Experiment
    listKind: ExperimentList
    plural: experiments
    shortNames:
    - exp
    - exps
    singular: experiment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.runPolicy.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.paused
      name: Paused
      type: boolean
    - jsonPath: .status.activeRun
      name: ActiveRun
      type: string
    - jsonPath: .status.lastScheduleTime
      name: LastSchedule
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Experiment is the Schema for the experiments API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Experiment
            properties:
              action:
                description: action defines the chaos operation to perform on selected
                  targets.
                properties:
                  force:
                    default: false
                    description: |-
                      force performs the action immediately without a grace period when true.
                      Only applicable for delete_pod actions.
                    type: boolean
                  type:
                    description: type is the chaos action to execute.
                    enum:
                    - delete_pod
                    type: string
                required:
                - type
                type: object
              approval:
                description: approval configures the optional manual approval gate.
                properties:
                  required:
                    default: false
                    description: required specifies whether manual approval is needed
                      before execution.
                    type: boolean
                  ttl:
                    description: ttl is how long to wait for approval before the run
                      expires.
                    type: string
                  webhook:
                    description: webhook configures the notification sent when approval
                      is required.
                    properties:
                      url:
                        description: url is the HTTP endpoint to notify when approval
                          is required.
                        type: string
                    required:
                    - url
                    type: object
                required:
                - required
                type: object
              dryRun:
                default: false
                description: |-
                  dryRun causes the controller to select targets and record them without
                  performing the actual chaos action.
                type: boolean
              failedHistoryLimit:
                default: 1
                description: failedHistoryLimit is the number of failed, skipped,
                  and expired ExperimentRuns to retain.
                format: int32
                minimum: 0
                type: integer
              mode:
                description: mode defines the target selection strategy.
                properties:
                  count:
                    description: count is the number of targets to select.
                    minimum: 1
                    type: integer
                  type:
                    default: random
                    description: type is the selection strategy.
                    enum:
                    - random
                    type: string
                required:
                - count
                - type
                type: object
              paused:
                default: false
                description: paused stops scheduling of new ExperimentRuns when true.
                type: boolean
              runPolicy:
                description: runPolicy controls scheduling behaviour.
                properties:
                  concurrencyPolicy:
                    default: Forbid
                    description: concurrencyPolicy defines what happens when a new
                      run is triggered while one is still active.
                    enum:
                    - Forbid
                    type: string
                  cooldown:
                    description: cooldown is the minimum duration between consecutive
                      runs.
                    type: string
                  schedule:
                    description: schedule is a cron expression used when type is Repeat.
                    type: string
                  type:
                    default: Once
                    description: type specifies whether the experiment runs once or
                      on a repeat schedule.
                    enum:
                    - Once
                    - Repeat
                    type: string
                required:
                - type
                type: object
              safety:
                description: safety defines the blast-radius constraints.
                properties:
                  denyNamespaces:
                    description: denyNamespaces lists namespaces that must never be
                      targeted.
                    items:
                      type: string
                    type: array
                  maxTargets:
                    description: maxTargets is the hard limit on how many pods can
                      be targeted in a single run.
                    minimum: 1
                    type: integer
                type: object
              selector:
                description: selector identifies the pool of pods eligible for targeting.
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: labels is a set of key/value pairs used to filter
                      pods.
                    type: object
                  namespace:
                    description: namespace restricts target selection to the specified
                      namespace.
                    type: string
                type: object
              successfulHistoryLimit:
                default: 3
                description: successfulHistoryLimit is the number of completed ExperimentRuns
                  to retain.
                format: int32
                minimum: 0
                type: integer
            required:
            - action
            - mode
            - runPolicy
            - selector
            type: object
          status:
            description: status defines the observed state of Experiment
            properties:
              activeRun:
                description: activeRun holds the name of the currently active ExperimentRun,
                  if any.
                type: string
              conditions:
                description: conditions represent the lifecycle state of the Experiment.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastScheduleTime:
                description: lastScheduleTime records when the most recent ExperimentRun
                  was created.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
