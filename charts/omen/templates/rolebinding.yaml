apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "omen.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omen.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "omen.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "omen.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
