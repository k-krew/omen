{{- $secretName := printf "%s-secret" (include "omen.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $token := "" -}}
{{- if $existing -}}
{{-   $token = $existing.data.token | b64dec -}}
{{- else -}}
{{-   $token = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omen.labels" . | nindent 4 }}
stringData:
  token: {{ $token }}
