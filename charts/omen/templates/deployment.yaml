apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "omen.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omen.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "omen.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "omen.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "omen.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.manager.leaderElect }}
            - --health-probe-bind-address={{ .Values.manager.healthProbeBindAddress }}
            - --metrics-bind-address={{ .Values.manager.metricsBindAddress }}
            {{- if .Values.webhook.tlsCertDir }}
            - --webhook-cert-path={{ .Values.webhook.tlsCertDir }}
            - --webhook-cert-name={{ .Values.webhook.tlsCertName }}
            - --webhook-cert-key={{ .Values.webhook.tlsCertKey }}
            {{- end }}
            {{- if .Values.manager.protectedNamespaces }}
            - --protected-namespaces={{ join "," .Values.manager.protectedNamespaces }}
            {{- end }}
          ports:
            - name: webhook-server
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if .Values.webhook.tlsCertDir }}
          volumeMounts:
            - name: webhook-certs
              mountPath: {{ .Values.webhook.tlsCertDir }}
              readOnly: true
          {{- end }}
      {{- if .Values.webhook.tlsCertDir }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "omen.fullname" . }}-webhook-tls
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
