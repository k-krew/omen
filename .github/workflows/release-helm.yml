name: Release Helm Chart

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  release-chart:
    name: Package and publish Helm chart to GHCR OCI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ env.VERSION }}/" charts/omen/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ env.VERSION }}\"/" charts/omen/Chart.yaml

      - name: Update default image tag in values.yaml
        run: |
          sed -i "s/^  tag:.*/  tag: \"${{ env.VERSION }}\"/" charts/omen/values.yaml

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: helm package charts/omen --destination /tmp/charts

      - name: Push chart to GHCR OCI registry
        run: |
          helm push /tmp/charts/omen-${{ env.VERSION }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
